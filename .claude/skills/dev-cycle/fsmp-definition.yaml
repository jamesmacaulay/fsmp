# dev-cycle — implement-and-review workflow, driven by fsmp.
#
# This state-machine definition owns the PROCESS SEQUENCE for the dev-cycle
# skill (SKILL.md beside this file). The orchestrator agent does not track
# "what's next" from memory — it drives this machine with `fsmp` and does what
# each returned step says. The machine makes the three habitual slips impossible:
# (1) skipping the implementer's response to a reviewer's notes — INCLUDING
# non-blocking ones; (2) not routing the fix back to the SAME reviewer for
# re-assessment; (3) presenting straight from review convergence without the
# manual verification capstone. Convergence ("N clean-initial reviewers") is a
# counter gate, so the agent cannot present early by miscount — and convergence
# is not done: `presenting` is reachable only through `verifying`.
#
# Installed into a project at .claude/skills/dev-cycle/fsmp-definition.yaml,
# the skill runs:
#   fsmp new --def .claude/skills/dev-cycle/fsmp-definition.yaml \
#     --id <project>-<issue> --set bar=<1|2> [--set capstone=false]
name: dev-cycle
description: >-
  Drive a coherent unit of work from brief to operator-mergeable PR via a
  persistent implementer and a fresh adversarial reviewer per round.

# Set once at `new`, read-only thereafter (the Phase-0 per-work-type call).
params:
  bar: 2            # clean-initial reviewers required to converge (drop to 1 for pure mechanical work)
  round_ceiling: 8  # escalate rather than loop past this many reviewer rounds
  capstone: true    # post-convergence manual verification pass; set false at `new` ONLY for work with nothing user-observable to drive

# Live run state.
context:
  clean_initial_count: 0   # reviewers whose INITIAL verdict was clean AND who then reached SATISFIED
  round_count: 1           # current reviewer round
  initial_was_clean: false # did THIS round's reviewer open with zero blocking?
  pr_url: ""               # filled in when the implementer opens the PR
  findings_url: ""         # the verification-findings PR comment, when the capstone fails

initial: triage

states:

  triage:
    guidance: |
      Phase 0 — scope & brief. Sort this work into: actionable / needs light
      design first / needs an operator decision / out of scope. This is NOT a
      full cold interrogation — the only question is "can I write a clear brief?"

      If actionable: author the kickoff brief, ensure the worktree + GitHub issue
      exist, and confirm the review bar ({bar} clean initials). Then `brief_ready`.
      Otherwise `escalate` — do the design or get the operator call first.
    transitions:
      brief_ready:
        to: implementing
        when: work is actionable and the kickoff brief is authored
      escalate:
        to: escalated
        when: needs design, an operator decision, or is out of scope

  implementing:
    guidance: |
      Phase 1 — the persistent implementer is building (TDD-first) and running
      the pre-push gate. Do nothing until it returns `PR <url> — gate green`.
      When it does, fire `pr_opened` with that url so later steps can cite it.
    transitions:
      pr_opened:
        to: awaiting_review
        requires: [pr_url]
        when: implementer returned the PR url with the gate green
      escalate:
        to: escalated
        when: a build/test failure the implementer cannot resolve

  awaiting_review:
    guidance: |
      Round {round_count}. A FRESH reviewer is reviewing PR {pr_url} with fresh
      eyes. When it returns, dispatch on its INITIAL verdict token — that
      classification is load-bearing for convergence, so record it now:

        • clean        → fire `verdict_clean`       (nothing to address; reviewer is already satisfied)
        • clean, notes → fire `verdict_clean_notes` (non-blocking notes STILL owe an implementer response)
        • changes      → fire `verdict_changes`     (one or more blocking problems)

      A clean-notes or changes verdict is NOT the end of the round. The reviewer
      keeps the last say. There is deliberately no path to `present` from here.
    transitions:
      verdict_clean:
        to: round_complete
        when: zero blocking AND zero non-blocking notes — literally nothing to address
        # No implementer exchange, no re-assessment: this reviewer counts immediately.
        effects:
          - { set: initial_was_clean, to: true }
          - { incr: clean_initial_count }
      verdict_clean_notes:
        to: awaiting_impl_response
        when: zero blocking, but the reviewer left non-blocking notes
        effects:
          - { set: initial_was_clean, to: true }
      verdict_changes:
        to: awaiting_impl_response
        when: one or more blocking problems
        effects:
          - { set: initial_was_clean, to: false }
      escalate:
        to: escalated
        when: recurring blocker or round ceiling reached

  awaiting_impl_response:
    guidance: |
      The reviewer's notes are NOT optional. Message the implementer to
      respond to EVERY note — blocking AND non-blocking — at {pr_url}: address
      each with code + a PR reply (or a justified deferral), push, return DONE.

      A non-blocking note still owes the SAME reviewer's SATISFIED. Do NOT
      substitute your own shallow check for the reviewer's re-assessment.
    transitions:
      impl_responded:
        to: awaiting_reassessment
        when: implementer returned DONE with the response pushed
      escalate:
        to: escalated
        when: a build/test failure the implementer cannot resolve

  awaiting_reassessment:
    guidance: |
      Send the SAME reviewer (not a fresh one) back in to re-assess how ITS OWN
      notes were handled — this is what catches theater fixes. If the response
      added or changed a test, the reviewer revert-proofs THAT test. Do not skip
      because the fix "looks trivial."

        • reviewer returns SATISFIED → fire `reviewer_satisfied`
        • reviewer returns CHANGES   → fire `reviewer_changes` (loops back to the implementer)
    transitions:
      reviewer_satisfied:
        to: round_complete
        when: the reviewer's notes are adequately addressed or justifiably deferred
        # Count this reviewer toward the bar ONLY if its INITIAL verdict was clean.
        effects:
          - if: { var: initial_was_clean, op: eq, value: true }
            then: { incr: clean_initial_count }
      reviewer_changes:
        to: awaiting_impl_response
        when: anything is still off — including a FRESH non-blocking note noticed now
      escalate:
        to: escalated
        when: the same blocker recurs across rounds

  round_complete:
    guidance: |
      This reviewer's round is done. Convergence: {clean_initial_count} of {bar}
      clean-initial reviewers so far (round {round_count} of {round_ceiling}).

      If the bar is met, `converge` to the verification capstone. Otherwise
      spawn the NEXT fresh reviewer with `next_round`. A clean initial from ONE
      reviewer is not convergence — you need {bar} SEPARATE reviewers who each
      opened clean.
    transitions:
      next_round:
        to: awaiting_review
        when: bar not yet met — spawn the next fresh reviewer (adaptive emphasis)
        blocked_reason: >-
          bar of {bar} clean-initial reviewers already met (have {clean_initial_count}),
          or round ceiling {round_ceiling} reached
        guards:
          - { var: clean_initial_count, op: lt, param: bar }
          - { var: round_count, op: lt, param: round_ceiling }
        effects:
          - { incr: round_count }
          - { set: initial_was_clean, to: false }
      converge:
        to: verifying
        when: the bar is met — every reviewer satisfied; on to the verification capstone
        blocked_reason: >-
          needs {bar} clean-initial reviewers, each subsequently SATISFIED;
          currently {clean_initial_count}
        guards:
          - { var: clean_initial_count, op: gte, param: bar }
      escalate:
        to: escalated
        when: round ceiling hit or a blocker recurs across rounds

  verifying:
    guidance: |
      Phase 2.5 — verification capstone. Convergence is NOT done: drive a
      manual verification pass of PR {pr_url} yourself, appropriate to the work
      (browser, live system, real lifecycle events) — exercising the
      user-observable and lifecycle-sensitive behavior the headless suite
      cannot fire.

        • nothing found → post ONE PR comment recording what you drove and what
          you observed, then fire `verification_passed`
        • defects found → post ONE PR comment with every finding: concrete
          evidence, plus forensics on WHY the automated tests were blind to it.
          Then fire `verification_failed` with that comment's url.

      `verification_waived` is open only when this run was created with
      capstone=false — a Phase-0 call, not one to make now because verification
      feels unnecessary.
    transitions:
      verification_passed:
        to: presenting
        when: the manual pass found nothing — observations recorded on the PR
      verification_failed:
        to: fixing
        requires: [findings_url]
        when: the manual pass surfaced defects — findings posted as ONE PR comment
        blocked_reason: >-
          round ceiling {round_ceiling} reached — escalate instead of opening
          another fix round
        guards:
          - { var: round_count, op: lt, param: round_ceiling }
        effects:
          - { incr: round_count }
      verification_waived:
        to: presenting
        when: capstone=false was set at `new` — nothing user-observable to drive
        blocked_reason: >-
          this run was created with capstone=true, so the verification pass is
          mandatory — run it, or escalate if you cannot
        guards:
          - { var: capstone, op: eq, value: false }
      escalate:
        to: escalated
        when: verification needs infra or a decision only the operator has

  fixing:
    guidance: |
      Message the PERSISTENT implementer (never a fresh spawn) to address
      the verification findings at {findings_url}: fix each defect with code
      plus a regression test where one is possible, state WHY the existing
      suite missed it, reply on the PR, push, and return DONE.
    transitions:
      fix_pushed:
        to: awaiting_fix_review
        when: implementer returned DONE with the fix pushed
      escalate:
        to: escalated
        when: a build/test failure the implementer cannot resolve

  awaiting_fix_review:
    guidance: |
      Round {round_count}. Spawn a FRESH reviewer scoped to the FIX-ROUND diff
      only — prior convergence stands for the untouched rest of PR {pr_url}.
      Same recording rule as round reviewers: the verdict must land as a PR
      comment — a sign-off comment for SATISFIED, findings for CHANGES — before
      you fire the transition.

        • SATISFIED → fire `fix_satisfied`, then RE-VERIFY: a reviewed fix has
          not passed the capstone yet
        • CHANGES   → fire `fix_changes` (loops back to the implementer)
    transitions:
      fix_satisfied:
        to: verifying
        when: fix reviewer satisfied, sign-off posted on the PR — re-run the verification pass
      fix_changes:
        to: fixing
        when: the fix reviewer found problems in the fix-round diff
      escalate:
        to: escalated
        when: the same defect survives repeated fix rounds

  presenting:
    guidance: |
      Phase 3 — shallow check, then PRESENT. Confirm: gate green on HEAD;
      every test-plan box ticked or annotated; {bar} clean-initial reviewers each
      reached SATISFIED with every non-blocking note addressed or justified; the
      verification capstone passed (or was waived at `new`). Then present PR
      {pr_url} with a merge-readiness summary.

      You NEVER self-merge. The operator clicks merge — fire `operator_merged`
      only after they have.
    transitions:
      operator_merged:
        to: merged
        when: the operator merged the PR
      escalate:
        to: escalated
        when: a late problem surfaces that needs an operator decision

  merged:
    terminal: true
    guidance: |
      Phase 4 — propagate. Update memory, the issue status, and knowledge/*.md;
      clean up the worktree/branch. This machine is complete.

  escalated:
    terminal: true
    guidance: |
      Escalated to the operator with the PR thread and a one-line hypothesis
      (reviewer over-reach / implementer misunderstanding / genuine design
      disagreement / spec ambiguity). Await the operator's decision. This
      machine is complete; start a fresh run if work resumes.
